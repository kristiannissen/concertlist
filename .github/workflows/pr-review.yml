name: PR Code Review
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: obledev/mistral-action@main
        with:
          mistral_api_key: ${{ secrets.MISTRAL_API_KEY }}
          prompt: |
            Review this PR for code quality, security, and performance.
            Provide specific, actionable suggestions for improvement.
            Focus on: best practices, potential bugs, and optimization opportunities.
	    Goal: Improve the engineers coding skills.
