name: PR Code Review
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Was obledev/mistral-action@main: its action.yml references `secrets`
      # directly inside a composite action, which GitHub rejects at manifest
      # load time regardless of what this workflow passes in. That action
      # has no tags to pin to and restricted issue creation, so calling the
      # Mistral API directly here instead.
      - name: Fetch PR diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} > pr.diff
          # Mistral's context window is finite - truncate defensively so a
          # large PR doesn't blow up the request.
          head -c 60000 pr.diff > pr.diff.trimmed

      - name: Review with Mistral and post comment
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          MISTRAL_MODEL: ${{ secrets.MISTRAL_MODEL }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          MODEL="${MISTRAL_MODEL:-mistral-large-latest}"
          DIFF=$(cat pr.diff.trimmed)
          PROMPT="Review this PR for code quality, security, and performance. Provide specific, actionable suggestions for improvement. Focus on: best practices, potential bugs, and optimization opportunities. Goal: improve the engineer's coding skills by providing usable, concrete feedback."

          BODY=$(jq -n --arg model "$MODEL" --arg prompt "$PROMPT" --arg diff "$DIFF" '{
            model: $model,
            messages: [
              {role: "system", content: "You are a senior engineer reviewing a GitHub pull request diff."},
              {role: "user", content: ($prompt + "\n\nDiff:\n" + $diff)}
            ]
          }')

          curl -sS --fail https://api.mistral.ai/v1/chat/completions \
            -H "Authorization: Bearer $MISTRAL_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$BODY" > response.json

          jq -e -r '.choices[0].message.content' response.json > review.md || {
            echo "Mistral API did not return a usable review:" >&2
            cat response.json >&2
            exit 1
          }

          gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body-file review.md
