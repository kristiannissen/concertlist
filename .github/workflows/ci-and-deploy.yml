name: Go CI and Vercel Deploy

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ---------------------------------------------------------
  # JOB 1: RUN TESTS
  # ---------------------------------------------------------
  test:
    name: Run Go Tests
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: |
          set +e
          go test -v ./... 2>&1 | tee test-output.log
          exit ${PIPESTATUS[0]}
        shell: bash

      - name: Capture test output
        if: failure()
        run: |
          delimiter="EOF_$(date +%s%N)"
          {
            echo "TEST_OUTPUT<<$delimiter"
            tail -c 60000 test-output.log
            echo "$delimiter"
          } >> "$GITHUB_ENV"

      - name: Tests failed
        if: failure()
        uses: JasonEtco/create-an-issue@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          filename: .github/failed-test-issue.md

  # ---------------------------------------------------------
  # JOB 2: DEPLOY TO VERCEL
  # ---------------------------------------------------------
  deploy:
    name: Deploy to Vercel

    # Only runs if the test job succeeds. Vercel's own automatic Git
    # deployments are disabled (see vercel.json: git.deploymentEnabled),
    # so this is the only path that triggers a deployment.
    needs: test

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v42
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          # Push to main -> production deploy. PR -> preview deploy.
          #
          # amondnet/vercel-action@v42 runs in stable CLI mode by default.
          # The typed `target` input (used below previously) only has any
          # effect when `experimental-api: true` is also set; without it,
          # `target` is silently ignored and every deployment falls back to
          # preview regardless of event type. This was undetected for a long
          # time because the action still reports success either way. Use
          # `vercel-args: --prod` instead, which is what CLI mode actually
          # reads to promote a deployment to production.
          vercel-args: ${{ github.event_name == 'push' && '--prod' || '' }}
