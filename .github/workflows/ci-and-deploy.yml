name: Go CI and Vercel Deploy

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ---------------------------------------------------------
  # JOB 1: RUN TESTS
  # ---------------------------------------------------------
  test:
    name: Run Go Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

  # ---------------------------------------------------------
  # JOB 2: DEPLOY TO VERCEL
  # ---------------------------------------------------------
  deploy:
    name: Deploy to Vercel

    # Only runs if the test job succeeds. Vercel's own automatic Git
    # deployments are disabled (see vercel.json: git.deploymentEnabled),
    # so this is the only path that triggers a deployment.
    needs: test

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          # Push to main -> production deploy. PR -> preview deploy.
          vercel-args: ${{ github.event_name == 'push' && '--prod' || '' }}
