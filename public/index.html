<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Koncertliste - Se kommende koncerter i Danmark">
    <meta name="theme-color" content="#7b3f00">
    <title>ConcertList - Kommende Koncerter</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/styles.css">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful');
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
</head>
<body>
    <div id="app">
        <header class="bg-primary text-primary-light p-4">
            <h1 class="text-2xl font-bold">ConcertList</h1>
            <p class="text-sm opacity-80">Kommende koncerter i Danmark</p>
        </header>
        
        <main class="container mx-auto p-4">
            <div id="skeleton-loader" class="skeleton-grid">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
            
            <div id="events-container" class="hidden">
                <div id="events-grid" class="bento-grid"></div>
            </div>
        </main>
    </div>
    
    <script src="/app.js"></script>
</body>
</html>
