<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Retro Pixel ConcertList - 1980s Arcade Edition">
    <meta name="theme-color" content="#0a0116">
    <title>RETRO CONCERTLIST</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful');
                        registration.onupdatefound = () => {
                            const installingWorker = registration.installing;
                            installingWorker.onstatechange = () => {
                                if (installingWorker.state === 'installed') {
                                    showUpdateToast();
                                }
                            };
                        };
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
        
        window.addEventListener('load', () => {
            checkForUpdates();
        });
        
        function checkForUpdates() {
            const currentVersion = '3.0.0';
            const storedVersion = localStorage.getItem('concertlist_version');
            if (storedVersion && storedVersion !== currentVersion) {
                showChangelogModal();
                localStorage.setItem('concertlist_version', currentVersion);
            } else if (!storedVersion) {
                localStorage.setItem('concertlist_version', currentVersion);
            }
        }
        
        function showUpdateToast() {
            const toast = document.getElementById('update-toast');
            if (toast) {
                toast.classList.remove('hidden');
                setTimeout(() => { toast.classList.add('hidden'); }, 10000);
            }
        }
        
        function showChangelogModal() {
            const modal = document.getElementById('changelog-modal');
            if (modal) { modal.classList.remove('hidden'); }
        }
        
        function hideChangelogModal() {
            const modal = document.getElementById('changelog-modal');
            if (modal) { modal.classList.add('hidden'); }
        }
        
        function skipWaiting() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.controller.postMessage({ type: 'SKIP_WAITING' });
            }
            const toast = document.getElementById('update-toast');
            if (toast) { toast.classList.add('hidden'); }
        }
        
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.addEventListener('message', (event) => {
                if (event.data.type === 'NEW_VERSION_AVAILABLE') {
                    showUpdateToast();
                }
            });
        }
    </script>
    <style>
        body { font-family: 'Press Start 2P', 'Courier New', monospace; }
        #update-toast {
            position: fixed; bottom: 2rem; right: 2rem;
            background: rgba(255, 0, 127, 0.95); color: #0a0116;
            padding: 1rem 1.5rem; border-radius: 0;
            box-shadow: 0 0 20px #ff007f; z-index: 1000;
            animation: slideIn 0.3s ease; border: 2px solid #ff007f;
            font-family: 'Press Start 2P', 'Courier New', monospace; font-size: 0.75rem;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        #update-toast button {
            background: #00ffff; color: #0a0116; border: none;
            padding: 0.5rem 1rem; border-radius: 0; margin-left: 1rem;
            font-weight: 600; cursor: pointer; transition: all 0.2s ease;
            font-family: 'Press Start 2P', 'Courier New', monospace; font-size: 0.75rem;
        }
        #update-toast button:hover { background: #00e5e5; box-shadow: 0 0 10px #00ffff; }
        #changelog-modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 1, 22, 0.95); z-index: 2000;
            display: flex; align-items: center; justify-content: center; padding: 1rem;
        }
        #changelog-content {
            background: #160a2b; border: 2px solid #00ffff;
            border-radius: 0; max-width: 500px; width: 100%; max-height: 80vh;
            overflow-y: auto; padding: 2rem; position: relative;
            font-family: 'Courier New', monospace;
        }
        #changelog-content::before { content: ''; position: absolute; top: -4px; left: -4px; right: -4px; bottom: -4px; background: #00ffff; z-index: -1; }
        #changelog-content h2 { color: #ff007f; margin-bottom: 1.5rem; font-size: 1.5rem; font-family: 'Press Start 2P', 'Courier New', monospace; }
        .changelog-item { margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid rgba(0, 255, 255, 0.2); }
        .changelog-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .changelog-item h3 { color: #00ffff; font-size: 1rem; margin-bottom: 0.5rem; font-family: 'Press Start 2P', 'Courier New', monospace; }
        .changelog-item p { color: #f0f0f0; font-size: 0.875rem; line-height: 1.5; }
        .changelog-type {
            display: inline-block; background: rgba(255, 0, 127, 0.2); color: #ff007f;
            padding: 0.25rem 0.5rem; border-radius: 0; font-size: 0.75rem;
            font-weight: 600; margin-left: 0.5rem; border: 1px solid #ff007f;
        }
        #close-changelog {
            position: absolute; top: 1rem; right: 1rem; background: none; border: none;
            color: #ff007f; font-size: 1.5rem; cursor: pointer; transition: all 0.2s ease;
            font-family: 'Press Start 2P', 'Courier New', monospace;
        }
        #close-changelog:hover { color: #ffffff; text-shadow: 0 0 5px #ff007f; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-grid text-base-color min-h-screen crt-effect">
    <div class="crt-overlay"></div>
    <div id="app">
        <header class="arcade-header">
            <h1 class="text-hot-pink text-3xl md:text-4xl font-bold tracking-wider">RETRO CONCERTLIST</h1>
            <p class="text-cyber-cyan text-sm md:text-base mt-2">1980s ARCADE EDITION</p>
        </header>
        <div class="filters-container">
            <button class="filter-chip active" data-filter="all">ALL</button>
            <button class="filter-chip" data-filter="vega">VEGA</button>
            <button class="filter-chip" data-filter="jazz">JAZZ</button>
            <button class="filter-chip" data-filter="drkon">DR KON</button>
        </div>
        <main class="container mx-auto p-4">
            <div id="skeleton-loader" class="skeleton-grid">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
            <div id="events-container" class="hidden">
                <div id="events-grid" class="bento-grid"></div>
            </div>
        </main>
    </div>
    <div id="update-toast" class="hidden">
        <span>NEW VERSION AVAILABLE - UPDATE NOW</span>
        <button onclick="skipWaiting()">UPDATE</button>
    </div>
    <div id="changelog-modal" class="hidden">
        <div id="changelog-content">
            <button id="close-changelog" onclick="hideChangelogModal()">X</button>
            <h2>WHAT'S NEW?</h2>
            <div id="changelog-entries"></div>
        </div>
    </div>
    <script src="/app.js"></script>
    <script>
        fetch('/changelog.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('changelog-entries');
                if (container) {
                    data.changes.forEach(change => {
                        const item = document.createElement('div');
                        item.className = 'changelog-item';
                        item.innerHTML = '<h3>' + change.title + '<span class="changelog-type">' + change.type + '</span></h3>' + '<p>' + change.description + '</p>';
                        container.appendChild(item);
                    });
                }
            })
            .catch(err => console.log('Failed to load changelog:', err));
    </script>
</body>
</html>
